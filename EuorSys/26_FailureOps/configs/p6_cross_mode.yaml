experiment_id: p6_cross_mode
mode_specs:
  - repetition_proxy_detector,repetition,proxy,detector,memory_x|idle_heavy_memory,high
  - repetition_proxy_layered,repetition,proxy,layered,memory_x|idle_heavy_memory,high
  - repetition_trace_layered,repetition,trace,layered,memory_x|idle_heavy_memory,high
  - surface_proxy_layered,surface,proxy,layered,surface_rotated_memory_x,high
num_seeds: 2
num_shots_per_seed: 100
seed_start: 42
seed_stride: 10000
interventions:
  - remove_data_noise
  - weaken_data_noise_50pct
  - remove_measurement_noise
  - weaken_measurement_noise_50pct
  - remove_idle_noise
  - weaken_idle_noise_50pct
  - remove_decoder_timeout
  - increase_decoder_workers_2x
  - increase_decoder_service_rate_2x
  - remove_decoder_queueing
  - relax_decoder_deadline_2x
  - reduce_idle_exposure_50pct
  - prioritize_high_weight_syndromes
bootstrap:
  num_resamples: 300
  seed: 2026
outputs:
  dir: data/results/p6
  mode_summary: data/results/p6_mode_summary.csv
  intervention_stability: data/results/p6_intervention_stability.csv
  rank_stability: data/results/p6_rank_stability.csv
