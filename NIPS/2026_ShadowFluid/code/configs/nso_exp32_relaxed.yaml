inherits: base_exp32.yaml

output_dir: ../results/bench_exp32/nso_relaxed

model:
  name: nso
  latent_dim: 8
  hidden_dim: 256
  slot_embed_dim: 32
  selection_temperature: 0.8

train:
  epochs: 80
  batch_size: 8
  lr: 0.0003
  weight_decay: 0.0
  selection_metric: nso_objective

loss:
  w_rho: 1.0
  w_spectral: 0.5
  w_energy: 0.2
  w_leakage: 0.1
  selection_leakage_weight: 0.16
  w_selection_entropy: 0.0
  w_selection_coverage: 0.0
