inherits: base_dev32.yaml

output_dir: ../results/bench_dev32/nso

model:
  name: nso
  latent_dim: 8
  hidden_dim: 128
  slot_embed_dim: 24

train:
  epochs: 16
  batch_size: 4
  lr: 0.0005
  weight_decay: 0.00001
  selection_metric: nso_objective

loss:
  w_leakage: 0.05
  selection_leakage_weight: 0.1
