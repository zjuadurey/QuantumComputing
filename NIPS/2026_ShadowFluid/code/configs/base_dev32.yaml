seed: 20260505
device: cpu
output_dir: ../results/bench_dev32/base

dataset:
  generate_if_missing: true
  data_path: ../results/bench_data/dev32_dataset_v3.npz
  manifest_path: ../results/bench_data/dev32_manifest_v3.csv
  split_column: split_id
  train_splits: [train]
  val_splits: [val]
  test_splits: [test]
  num_workers: 0
  nx: 5
  K0: 6.0
  exact_solver: expm_multiply
  verbose: true
  time_grid: [0.15, 0.30, 0.45, 0.60, 0.75]
  max_modes: 3
  candidate_pool_hops: 2
  candidate_pool_max: 10
  seeds: [0, 1]
  single_alphas: [0.2, 0.8]
  single_q: [1, 0]
  num_multi_potentials: 1
  multi_J_choices: [2, 3]
  multi_alpha_scale: 0.6
  multi_q_max: 4
  multi_seed: 20260505
  split_seed: 321
  ood_alpha_threshold: 0.8

train:
  epochs: 12
  batch_size: 4
  lr: 0.0005
  weight_decay: 0.0
  selection_metric: loss_total

evaluation:
  batch_size: 4

loss:
  w_rho: 1.0
  w_spectral: 0.5
  w_energy: 0.1
  w_leakage: 0.0
  selection_leakage_weight: 0.1

model:
  name: placeholder
  latent_dim: 8
  hidden_dim: 128
  hamiltonian_feature_dim: 15
